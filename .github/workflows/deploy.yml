name: Deploy GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Compute Pages base path
        id: pages
        shell: bash
        run: |
          repo_name="${{ github.event.repository.name }}"
          configured_base="${{ vars.PAGES_BASE_PATH }}"

          if [[ -n "$configured_base" ]]; then
            base="$configured_base"
          elif [[ "$repo_name" == *.github.io ]]; then
            base="/"
          else
            base="/$repo_name/"
          fi

          if [[ "$base" != "/" ]]; then
            base="/${base#/}"
            base="${base%/}/"
          fi

          echo "root=$base" >> "$GITHUB_OUTPUT"

      - name: Build
        run: pnpm build
        env:
          BASE_PATH: ${{ steps.pages.outputs.root }}

      - name: Copy 404 fallback for SPA routing
        run: cp dist/index.html dist/404.html

      - name: Deploy
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: gh-pages
          folder: dist
          clean-exclude: |
            pr-preview
          force: false
